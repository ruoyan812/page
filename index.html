<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yanverse</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #06b6d4;
    --primary-dark: #0891b2;
    --gradient-1: #06b6d4;
    --gradient-2: #3b82f6;
    --gradient-3: #8b5cf6;
    --bg: #f0f4f8;
    --card-bg: rgba(255,255,255,0.75);
    --card-border: rgba(255,255,255,0.3);
    --text: #0f172a;
    --text-soft: #64748b;
    --nav-bg: rgba(15,23,42,0.9);
    --nav-border: rgba(255,255,255,0.08);
    --footer-bg: rgba(15,23,42,0.95);
    --shadow: 0 8px 32px rgba(0,0,0,0.06);
    --radius: 16px;
    --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "JetBrains Mono", "SF Mono", ui-monospace, monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b1120;
      --card-bg: rgba(30,41,59,0.7);
      --card-border: rgba(148,163,184,0.15);
      --text: #f1f5f9;
      --text-soft: #94a3b8;
      --nav-bg: rgba(15,23,42,0.95);
      --footer-bg: rgba(2,6,23,0.98);
      --shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
  }

  html { font-family: var(--font); color: var(--text); }
  body {
    margin: 0;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s, color 0.4s;
  }

  /* ---- 浮动装饰 ---- */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 20s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
    top: -120px; left: -80px;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: linear-gradient(135deg, var(--gradient-2), var(--gradient-3));
    bottom: -100px; right: -60px;
    animation-delay: -7s;
  }
  .orb-3 {
    width: 300px; height: 300px;
    background: linear-gradient(135deg, var(--gradient-3), var(--gradient-1));
    top: 50%; left: 60%;
    animation-delay: -14s;
    opacity: 0.15;
  }
  @keyframes orbFloat {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(30px, -40px) scale(1.08); }
    66%  { transform: translate(-20px, 20px) scale(0.95); }
    100% { transform: translate(10px, -10px) scale(1.05); }
  }

  /* ---- 导航 ---- */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--nav-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--nav-border);
    transition: background 0.3s;
  }
  .header-content {
    max-width: 900px;
    margin: 0 auto;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
  }
  .brand {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gradient-1), var(--gradient-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1.5px;
  }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .nav-links a {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 8px;
    transition: all 0.2s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: 2px; left: 50%;
    width: 0; height: 2px;
    background: var(--primary);
    border-radius: 2px;
    transition: all 0.25s;
    transform: translateX(-50%);
  }
  .nav-links a:hover {
    color: #fff;
    background: rgba(255,255,255,0.06);
  }
  .nav-links a:hover::after { width: 60%; }

  /* ---- 主内容 ---- */
  .app-content {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px 64px;
    position: relative;
    z-index: 1;
    min-height: calc(100vh - 120px);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---- Hero ---- */
  .hero-section {
    text-align: center;
    margin-bottom: 8px;
    animation: fadeUp 0.8s ease-out;
  }
  .hero-section h1 {
    font-size: 40px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-soft) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }
  @media (max-width: 576px) {
    .hero-section h1 { font-size: 28px; }
  }

  #greeting {
    font-size: 15px;
    color: var(--text-soft);
    margin-top: 6px;
    font-weight: 400;
  }

  /* ---- 时间卡片 ---- */
  .time-card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 28px 40px;
    text-align: center;
    max-width: 360px;
    width: 100%;
    margin: 24px auto 40px;
    box-shadow: var(--shadow);
    transition: transform 0.25s, box-shadow 0.25s, background 0.3s;
    animation: fadeUp 0.8s ease-out 0.1s both;
  }
  .time-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 48px rgba(0,0,0,0.1);
  }
  .time-display {
    font-family: var(--mono);
    font-size: 48px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    line-height: 1.2;
  }
  .date-display {
    font-size: 14px;
    color: var(--text-soft);
    margin-top: 6px;
  }

  /* ---- 快捷入口 ---- */
  .quick-links {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    width: 100%;
    max-width: 560px;
    animation: fadeUp 0.8s ease-out 0.2s both;
  }
  .quick-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 20px 12px;
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }
  .quick-link:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.1);
    border-color: var(--primary);
  }
  .quick-link .icon {
    font-size: 28px;
    line-height: 1;
  }
  .quick-link .label {
    font-size: 13px;
    color: var(--text-soft);
  }

  /* ---- 底部链接 ---- */
  .footer-links {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 32px;
    flex-wrap: wrap;
    animation: fadeUp 0.8s ease-out 0.3s both;
  }
  .footer-links a {
    color: var(--primary);
    text-decoration: none;
    font-size: 13px;
    padding: 7px 18px;
    background: rgba(6,182,212,0.08);
    border-radius: 8px;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .footer-links a:hover {
    background: rgba(6,182,212,0.15);
    border-color: rgba(6,182,212,0.25);
    color: var(--primary-dark);
  }

  /* ---- Footer ---- */
  .app-footer {
    background: var(--footer-bg);
    padding: 20px 24px;
    text-align: center;
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--nav-border);
    transition: background 0.3s;
  }
  .app-footer p {
    margin: 0;
    color: var(--text-soft);
    font-size: 12px;
  }

  /* ---- 动画 ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---- 响应式 ---- */
  @media (max-width: 576px) {
    .header-content { padding: 0 16px; }
    .app-content { padding: 32px 16px 48px; }
    .time-card { padding: 20px 24px; }
    .time-display { font-size: 36px; }
    .quick-links { grid-template-columns: repeat(2, 1fr); }
    .nav-links a { font-size: 12px; padding: 5px 8px; }
  }
 .lang-select { position: relative; display: inline-block; }
  #lang-label { cursor: pointer; padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; }
  #lang-menu { position: absolute; right: 0; top: 110%; display: none; background: #fff; border: 1px solid #ddd; border-radius: 4px; min-width: 150px; z-index: 9999; }
  #lang-menu li { padding: 8px 14px; cursor: pointer; }
  #lang-menu li:hover { background: #f5f5f5; }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<header class="app-header">
  <div class="header-content">
    <span class="brand">Yanverse</span>
    <nav class="nav-links">
      <a href="https://yuanbao.tencent.com">元宝</a>
      <a href="http://file-change.page.roooooyan.work/">文件类型转换（维护中）</a>
      <a href="sdsz">实验加油-头像制作</a>
      <a href="https://mail.roooooyan.work">Mail</a>
     <!-- 语言选择器 -->
     <div class="lang-select">
  <span id="lang-label">🌐 TRANS ▾</span>
  <ul id="lang-menu">
    <li data-lang="en">🇺🇸 English</li>
    <li data-lang="de">🇩🇪 Deutsch</li>
    <li data-lang="ja">🇯🇵 日本語</li>
  </ul>
</div>

<h1 data-i18n>欢迎来到我的网站</h1>
<p data-i18n>这是一个示例描述。</p>
<button data-i18n>点击查看详情</button>

<script>
const label = document.getElementById('lang-label');
const menu = document.getElementById('lang-menu');

label.onclick = e => {
  e.stopPropagation();
  menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
};
document.onclick = () => menu.style.display = 'none';

/* ✅ 模拟翻译接口（后期可替换为 DeepL / GPT） */
async function fetchTranslation(text, lang) {
  // 这里只是示例，实际你会调用真实 API
  const fakeDB = {
    en: { "欢迎来到我的网站": "Welcome to my website", "这是一个示例描述。": "This is a sample description.", "点击查看详情": "View Details" },
    de: { "欢迎来到我的网站": "Willkommen auf meiner Website", "这是一个示例描述。": "Dies ist eine Beispielbeschreibung.", "点击查看详情": "Details anzeigen" },
    ja: { "欢迎来到我的网站": "私のウェブサイトへようこそ", "这是一个示例描述。": "これはサンプルの説明です。", "点击查看详情": "詳細を見る" }
  };
  return fakeDB[lang][text] || text;
}

/* ✅ 主翻译逻辑 */
async function translatePage(lang) {
  localStorage.setItem("site_lang", lang);
  label.textContent = "🌐 Translating...";

  const nodes = document.querySelectorAll('[data-i18n]');

  for (const node of nodes) {
    const original = node.textContent.trim();
    const cacheKey = lang + "|" + original;

    let translated = localStorage.getItem(cacheKey);
    if (!translated) {
      translated = await fetchTranslation(original, lang);
      localStorage.setItem(cacheKey, translated);
    }
    node.textContent = translated;
  }

  label.textContent = "🌐 TRANS ▾";
}

menu.querySelectorAll("li").forEach(li => {
  li.onclick = () => translatePage(li.dataset.lang);
});

/* ✅ 页面加载恢复 */
window.onload = () => {
  const lang = localStorage.getItem("site_lang");
  if (lang) translatePage(lang);
};
</script>
    </nav>
  </div>
</header>

<main class="app-content">
  <div class="hero-section">
    <h1>Welcome to Yanverse</h1>
    <p id="greeting"></p>
  </div>

  <div class="time-card">
    <div class="time-display" id="time">--:--:--</div>
    <div class="date-display" id="date">----年--月--日 星期-</div>
    <div style="margin-top:12px;font-size:13px">
      <a href="onthisday.html" style="color:var(--primary);text-decoration:none;border-bottom:1px dashed var(--primary)">📖 了解历史上的今天</a>
    </div>
  </div>

  <div class="quick-links">
    <a class="quick-link" href="https://test.page.roooooyan.work">
      <span class="icon">🧪</span>
      <span class="label">站内资源搜索</span>
    </a>
    <a class="quick-link" href="search">
      <span class="icon">🔍</span>
      <span class="label">搜索引擎(bing)</span>
    </a>
    <a class="quick-link" href="https://game.page.roooooyan.work">
      <span class="icon">🎮</span>
      <span class="label">游戏</span>
    </a>
    <a class="quick-link" href="https://mzbj.roooooyan.work">
      <span class="icon"><img src="https://pan.page.roooooyan.work/file/1781940953079_maozai.png" width="40px" height="40px"></span>
      <span class="label">猫仔（试运行）</span>
    </a>
    <a class="quick-link" href="weather">
      <span class="icon">☀️</span>
      <span class="lable">天气</span>
    </a>
  </div>

  <div class="footer-links">
    <a href="info.html">📊 访问信息</a>
    <a href="feedback.html">💬 意见反馈</a>
  </div>
</main>

<footer class="app-footer">
  <p>&copy; 2013 - <span id="year">2026</span> Yanverse</p>
</footer>

<script>
(function() {
  var timeEl = document.getElementById('time');
  var dateEl = document.getElementById('date');
  var greetEl = document.getElementById('greeting');

  function pad(n) { return String(n).padStart(2, '0'); }

  function getGreeting(h) {
    if (h < 6) return '夜深了，注意休息 🌙';
    if (h < 9) return '早上好，新的一天开始了 🌅';
    if (h < 12) return '上午好，保持专注 ☀️';
    if (h < 14) return '中午好，记得吃午饭 🍜';
    if (h < 18) return '下午好，继续加油 ⛅';
    return '晚上好，放松一下吧 🌆';
  }

  function update() {
    var now = new Date();
    var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
    timeEl.textContent = pad(h) + ':' + pad(m) + ':' + pad(s);
    dateEl.textContent = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日 星期' + ['日','一','二','三','四','五','六'][now.getDay()];
    if (greetEl) greetEl.textContent = getGreeting(h);
  }

  document.getElementById('year').textContent = new Date().getFullYear();
  update();
  setInterval(update, 1000);
})();
</script>
 <!-- 语言切换 Icon -->
</body>
</html>
