<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SDSZ Student Union · Yanverse</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #06b6d4;
    --primary-dark: #0891b2;
    --gradient-1: #06b6d4;
    --gradient-2: #3b82f6;
    --gradient-3: #8b5cf6;
    --bg: #f0f4f8;
    --card-bg: rgba(255,255,255,0.75);
    --card-border: rgba(255,255,255,0.3);
    --text: #0f172a;
    --text-soft: #64748b;
    --nav-bg: rgba(15,23,42,0.9);
    --nav-border: rgba(255,255,255,0.08);
    --footer-bg: rgba(15,23,42,0.95);
    --shadow: 0 8px 32px rgba(0,0,0,0.06);
    --radius: 16px;
    --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "JetBrains Mono", "SF Mono", ui-monospace, monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b1120;
      --card-bg: rgba(30,41,59,0.7);
      --card-border: rgba(148,163,184,0.15);
      --text: #f1f5f9;
      --text-soft: #94a3b8;
      --nav-bg: rgba(15,23,42,0.95);
      --footer-bg: rgba(2,6,23,0.98);
      --shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
  }

  html { font-family: var(--font); color: var(--text); }
  body {
    margin: 0;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s, color 0.4s;
    display: flex;
    flex-direction: column;
  }

  /* ---- 浮动装饰 ---- */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 20s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
    top: -120px; left: -80px;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: linear-gradient(135deg, var(--gradient-2), var(--gradient-3));
    bottom: -100px; right: -60px;
    animation-delay: -7s;
  }
  .orb-3 {
    width: 300px; height: 300px;
    background: linear-gradient(135deg, var(--gradient-3), var(--gradient-1));
    top: 50%; left: 60%;
    animation-delay: -14s;
    opacity: 0.15;
  }
  @keyframes orbFloat {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(30px, -40px) scale(1.08); }
    66%  { transform: translate(-20px, 20px) scale(0.95); }
    100% { transform: translate(10px, -10px) scale(1.05); }
  }

  /* ---- 导航 ---- */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--nav-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--nav-border);
    transition: background 0.3s;
  }
  .header-content {
    max-width: 900px;
    margin: 0 auto;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
  }
  .brand {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gradient-1), var(--gradient-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1.5px;
    text-decoration: none;
  }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .nav-links a {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 8px;
    transition: all 0.2s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: 2px; left: 50%;
    width: 0; height: 2px;
    background: var(--primary);
    border-radius: 2px;
    transition: all 0.25s;
    transform: translateX(-50%);
  }
  .nav-links a:hover {
    color: #fff;
    background: rgba(255,255,255,0.06);
  }
  .nav-links a:hover::after { width: 60%; }

  /* ---- 主内容 ---- */
  .app-content {
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 24px 48px;
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* ---- 页面标题 ---- */
  .page-head {
    text-align: center;
    margin-bottom: 20px;
    animation: fadeUp 0.8s ease-out;
  }
  .page-head h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-soft) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }
  .page-head p {
    font-size: 14px;
    color: var(--text-soft);
    margin-top: 6px;
  }

  /* ---- iframe 卡片 ---- */
  .embed-card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    flex: 1;
    min-height: 70vh;
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.8s ease-out 0.1s both;
    transition: background 0.3s, border-color 0.3s;
  }
  .embed-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--card-border);
    background: rgba(255,255,255,0.4);
    transition: background 0.3s;
  }
  @media (prefers-color-scheme: dark) {
    .embed-toolbar { background: rgba(15,23,42,0.4); }
  }
  .embed-dots {
    display: flex;
    gap: 6px;
  }
  .embed-dots span {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(148,163,184,0.4);
  }
  .embed-title {
    font-size: 12px;
    color: var(--text-soft);
    font-family: var(--mono);
    flex: 1;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .embed-actions {
    display: flex;
    gap: 4px;
  }
  .embed-actions a {
    color: var(--text-soft);
    text-decoration: none;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .embed-actions a:hover {
    color: var(--primary);
    background: rgba(6,182,212,0.1);
  }
  .embed-frame {
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
  }
  .embed-loading {
    padding: 40px;
    text-align: center;
    color: var(--text-soft);
    font-size: 14px;
  }

  /* ---- 底部链接 ---- */
  .footer-links {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 24px;
    flex-wrap: wrap;
    animation: fadeUp 0.8s ease-out 0.2s both;
  }
  .footer-links a {
    color: var(--primary);
    text-decoration: none;
    font-size: 13px;
    padding: 7px 18px;
    background: rgba(6,182,212,0.08);
    border-radius: 8px;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .footer-links a:hover {
    background: rgba(6,182,212,0.15);
    border-color: rgba(6,182,212,0.25);
    color: var(--primary-dark);
  }

  /* ---- Footer ---- */
  .app-footer {
    background: var(--footer-bg);
    padding: 20px 24px;
    text-align: center;
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--nav-border);
    transition: background 0.3s;
  }
  .app-footer p {
    margin: 0;
    color: var(--text-soft);
    font-size: 12px;
  }

  /* ---- 动画 ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---- 响应式 ---- */
  @media (max-width: 576px) {
    .header-content { padding: 0 16px; }
    .app-content { padding: 24px 12px 36px; }
    .page-head h1 { font-size: 22px; }
    .embed-card { min-height: 60vh; border-radius: 12px; }
    .embed-title { display: none; }
    .nav-links a { font-size: 12px; padding: 5px 8px; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<header class="app-header">
  <div class="header-content">
    <a class="brand" href="https://www.page.roooooyan.work/">Yanverse</a>
  </div>
</header>

<main class="app-content">
  <div class="page-head">
    <h1>SDSZ Student Union</h1>
    <p>北师大实验中学学生会</p>
  </div>

  <div class="embed-card">
    <div class="embed-toolbar">
      <div class="embed-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="embed-title">sdszstudentunion.github.io</div>
      <div class="embed-actions">
        <a href="https://sdszstudentunion.github.io/" target="_blank" rel="noopener">新窗口</a>
        <a href="javascript:location.reload()">刷新</a>
      </div>
    </div>
    <iframe
      class="embed-frame"
      src="https://sdszstudentunion.github.io/"
      title="SDSZ Student Union"
      loading="eager"
      referrerpolicy="no-referrer-when-downgrade"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-downloads"
      allow="fullscreen">
      <div class="embed-loading">
        页面无法嵌入显示，请<a href="https://sdszstudentunion.github.io/" target="_blank" rel="noopener" style="color:var(--primary);">直接访问</a>。
      </div>
    </iframe>
  </div>

  <div class="footer-links">
    <a href="https://www.page.roooooyan.work/">← 返回主页</a>
    <a href="https://sdszstudentunion.github.io/" target="_blank" rel="noopener">打开源站</a>
  </div>
</main>

<footer class="app-footer">
  <p>&copy; 2013 - <span id="year">2026</span> Yanverse · 嵌入内容版权归原作者所有</p>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
