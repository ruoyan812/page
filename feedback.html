<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>意见反馈 - Yanverse</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #06b6d4;
    --primary-dark: #0891b2;
    --gradient-1: #06b6d4;
    --gradient-2: #3b82f6;
    --gradient-3: #8b5cf6;
    --bg: #f0f4f8;
    --card-bg: rgba(255,255,255,0.75);
    --card-border: rgba(255,255,255,0.3);
    --text: #0f172a;
    --text-soft: #64748b;
    --nav-bg: rgba(15,23,42,0.9);
    --nav-border: rgba(255,255,255,0.08);
    --footer-bg: rgba(15,23,42,0.95);
    --shadow: 0 8px 32px rgba(0,0,0,0.06);
    --radius: 16px;
    --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b1120;
      --card-bg: rgba(30,41,59,0.7);
      --card-border: rgba(148,163,184,0.15);
      --text: #f1f5f9;
      --text-soft: #94a3b8;
      --nav-bg: rgba(15,23,42,0.95);
      --footer-bg: rgba(2,6,23,0.98);
      --shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
  }

  html { font-family: var(--font); color: var(--text); }
  body {
    margin: 0;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s, color 0.4s;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 20s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
    top: -120px; left: -80px;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: linear-gradient(135deg, var(--gradient-2), var(--gradient-3));
    bottom: -100px; right: -60px;
    animation-delay: -7s;
  }
  @keyframes orbFloat {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(30px, -40px) scale(1.08); }
    66%  { transform: translate(-20px, 20px) scale(0.95); }
    100% { transform: translate(10px, -10px) scale(1.05); }
  }

  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--nav-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--nav-border);
  }
  .header-content {
    max-width: 900px;
    margin: 0 auto;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
  }
  .brand {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gradient-1), var(--gradient-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1.5px;
    cursor: pointer;
  }
  .back-link {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 8px;
    transition: all 0.2s;
  }
  .back-link:hover {
    color: #fff;
    background: rgba(255,255,255,0.06);
  }

  .app-content {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px 64px;
    position: relative;
    z-index: 1;
    min-height: calc(100vh - 120px);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hero-section {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease-out;
  }
  .hero-section h1 {
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-soft) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }
  .hero-section p {
    font-size: 14px;
    color: var(--text-soft);
    margin-top: 6px;
  }

  .form-card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 32px;
    max-width: 480px;
    width: 100%;
    box-shadow: var(--shadow);
    animation: fadeUp 0.6s ease-out 0.1s both;
    transition: background 0.3s;
  }
  .form-card label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    display: block;
    margin-bottom: 6px;
  }
  .form-card input,
  .form-card textarea {
    width: 100%;
    padding: 10px 14px;
    margin-bottom: 18px;
    border: 1px solid var(--card-border);
    border-radius: 10px;
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: var(--bg);
    color: var(--text);
  }
  .form-card input:focus,
  .form-card textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(6,182,212,0.15);
  }
  .form-card textarea { resize: vertical; min-height: 120px; }
  .form-card button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    font-family: var(--font);
  }
  .form-card button:hover { opacity: 0.9; transform: translateY(-1px); }
  .form-card button:active { transform: scale(0.98); }
  #status {
    text-align: center;
    font-size: 14px;
    margin-top: 14px;
    min-height: 20px;
  }

  .app-footer {
    background: var(--footer-bg);
    padding: 20px 24px;
    text-align: center;
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--nav-border);
  }
  .app-footer p {
    margin: 0;
    color: var(--text-soft);
    font-size: 12px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 576px) {
    .header-content { padding: 0 16px; }
    .app-content { padding: 32px 16px 48px; }
    .form-card { padding: 24px; }
    .hero-section h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header class="app-header">
  <div class="header-content">
    <span class="brand" onclick="location.href='/'">Yanverse</span>
    <a class="back-link" href="/">← 返回首页</a>
  </div>
</header>

<main class="app-content">
  <div class="hero-section">
    <h1>意见与建议</h1>
    <p>你的反馈将帮助 Yanverse 变得更好</p>
  </div>

  <div class="form-card">
    <form onsubmit="event.preventDefault(); sendMail();">
      <label>姓名</label>
      <input id="name" placeholder="匿名用户">

      <label>反馈内容</label>
      <textarea id="message" rows="5" placeholder="请输入您的建议"></textarea>

      <button type="submit">发送反馈</button>
      <p id="status"></p>
    </form>
  </div>
</main>

<footer class="app-footer">
  <p>&copy; 2013 - <span id="year">2026</span> Yanverse</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
(function() {
  document.getElementById('year').textContent = new Date().getFullYear();

  emailjs.init("O0c6Hvi0DVvWYqvM_");

  window.sendMail = function() {
    var name = document.getElementById('name').value;
    var msg = document.getElementById('message').value;
    var status = document.getElementById('status');

    if (!msg.trim()) {
      status.innerText = "内容不能为空";
      status.style.color = "#ef4444";
      return;
    }

    emailjs.send("service_okc5com", "template_3pk0hiq", {
      content: msg,
      time: new Date().toLocaleString('zh-CN'),
      page_url: location.href,
      username: name
    }).then(function() {
      status.innerText = "发送成功，感谢您的支持";
      status.style.color = "#10b981";
      document.getElementById('message').value = "";
    }).catch(function() {
      status.innerText = "发送失败，请稍后重试";
      status.style.color = "#ef4444";
    });
  };
})();
</script>
</body>
</html>
