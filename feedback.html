<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>意见反馈 - Yanverse</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<style>
    body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #222;
}

.header {
    padding: 20px;
    border-bottom: 1px solid #eee;
}

.container {
    max-width: 600px;
    margin: 30px auto;
    padding: 0 20px;
}

.time {
    font-size: 32px;
    font-weight: bold;
}

.date {
    font-size: 14px;
    color: #666;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    box-sizing: border-box;
}

button {
    padding: 8px 16px;
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: #999;
}
</style>
<body>
    <header class="header">
        <h1>意见与建议</h1>
    </header>

    <main class="container">
        <form onsubmit="event.preventDefault(); sendMail();">
            <label>姓名</label><br>
            <input id="name" placeholder="匿名用户"><br>

            <label>反馈内容</label><br>
            <textarea id="message" rows="5" placeholder="请输入您的建议"></textarea><br>

            <button type="submit">发送</button>
            <p id="status"></p>
        </form>
    </main>

    <footer>
        <code>© 2013 - 2026 Yanverse</code>
    </footer>

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        emailjs.init("O0c6Hvi0DVvWYqvM_");

        function sendMail() {
            const name = document.getElementById('name').value;
            const msg = document.getElementById('message').value;
            const status = document.getElementById('status');

            if (!msg.trim()) {
                status.innerText = "⚠️ 内容不能为空";
                return;
            }

            emailjs.send(
                "service_okc5com",
                "template_3pk0hiq",
                {
                    content: msg,
                    time: new Date().toLocaleString('zh-CN'),
                    page_url: location.href,
                    username: name
                }
            ).then(() => {
                status.innerText = "✅ 发送成功，感谢您的支持";
                document.getElementById('message').value = "";
            }).catch(() => {
                status.innerText = "❌ 发送失败";
            });
        }
    </script>
</body>
</html>
