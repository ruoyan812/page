
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气 - Yanverse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
--primary:#06b6d4;
--primary-dark:#0891b2;
--gradient-1:#06b6d4;
--gradient-2:#3b82f6;
--gradient-3:#8b5cf6;
--bg:#f0f4f8;
--card-bg:rgba(255,255,255,0.75);
--card-border:rgba(255,255,255,0.3);
--text:#0f172a;
--text-soft:#64748b;
--nav-bg:rgba(15,23,42,0.9);
--nav-border:rgba(255,255,255,0.08);
--footer-bg:rgba(15,23,42,0.95);
--shadow:0 8px 32px rgba(0,0,0,0.06);
--radius:16px;
--font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
--mono:"JetBrains Mono","SF Mono",ui-monospace,monospace
}

@media(prefers-color-scheme:dark){
:root{
--bg:#0b1120;
--card-bg:rgba(30,41,59,0.7);
--card-border:rgba(148,163,184,0.15);
--text:#f1f5f9;
--text-soft:#94a3b8;
--nav-bg:rgba(15,23,42,0.95);
--footer-bg:rgba(2,6,23,0.98);
--shadow:0 8px 32px rgba(0,0,0,0.3)
}
}

html{font-family:var(--font);color:var(--text)}
body{margin:0;background:var(--bg);min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s}

.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.25;pointer-events:none;z-index:0;animation:orbFloat 20s ease-in-out infinite alternate}
.orb-1{width:500px;height:500px;background:linear-gradient(135deg,var(--gradient-1),var(--gradient-2));top:-120px;left:-80px}
.orb-2{width:400px;height:400px;background:linear-gradient(135deg,var(--gradient-2),var(--gradient-3));bottom:-100px;right:-60px;animation-delay:-7s}
.orb-3{width:300px;height:300px;background:linear-gradient(135deg,var(--gradient-3),var(--gradient-1));top:50%;left:60%;animation-delay:-14s;opacity:.15}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-40px) scale(1.08)}66%{transform:translate(-20px,20px) scale(.95)}100%{transform:translate(10px,-10px) scale(1.05)}}

.app-header{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--nav-border);transition:background .3s}
.header-content{max-width:900px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.brand{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--gradient-1),var(--gradient-3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1.5px;text-decoration:none;cursor:pointer}
.nav-links{display:flex;align-items:center;gap:2px}
.nav-links a{color:rgba(255,255,255,.75);text-decoration:none;font-size:13px;padding:6px 12px;border-radius:8px;transition:all .2s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:2px;left:50%;width:0;height:2px;background:var(--primary);border-radius:2px;transition:all .25s;transform:translateX(-50%)}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,.06)}
.nav-links a:hover::after{width:60%}

.app-content{max-width:900px;margin:0 auto;padding:36px 24px 64px;position:relative;z-index:1}
.page-title{font-size:28px;font-weight:700;text-align:center;margin-bottom:24px}
.page-title span{background:linear-gradient(135deg,var(--text) 0%,var(--text-soft) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.weather-card{background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:var(--radius);padding:28px 32px;box-shadow:var(--shadow);transition:transform .25s,box-shadow .25s,background .3s;animation:fadeUp .6s ease-out}
.weather-card:hover{transform:translateY(-2px);box-shadow:0 12px 48px rgba(0,0,0,.1)}
.forecast-card{background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px 32px;margin-top:16px;box-shadow:var(--shadow);transition:background .3s;animation:fadeUp .6s ease-out .1s both}
.forecast-card:hover{transform:translateY(-2px);box-shadow:0 12px 48px rgba(0,0,0,.1)}
.location{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:14px;color:var(--text-soft)}
.location svg{width:16px;height:16px;fill:var(--text-soft)}
.city-name{font-size:24px;font-weight:600;margin-bottom:2px}
.city-sub{font-size:13px;color:var(--text-soft);margin-bottom:10px}
.update-time{font-size:12px;color:var(--text-soft);opacity:.6;margin-bottom:20px}
.weather-main{display:flex;align-items:center;gap:20px;margin-bottom:16px}
.weather-icon{font-size:72px;line-height:1}
.temp-group{flex:1}
.temp-current{font-size:64px;font-weight:200;line-height:1;font-family:var(--mono);letter-spacing:-2px}
.temp-range{font-size:14px;color:var(--text-soft);margin-top:4px}
.weather-desc{font-size:16px;color:var(--text);opacity:.7;margin-top:4px}
.details-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin-top:20px;padding-top:20px;border-top:1px solid var(--card-border)}
.detail-item{text-align:center}
.detail-item .label{font-size:12px;color:var(--text-soft);margin-bottom:4px}
.detail-item .value{font-size:18px;font-weight:500;font-family:var(--mono)}
.detail-item .value .unit{font-size:12px;font-weight:400;color:var(--text-soft);font-family:var(--font)}
.uv-bar-wrap{background:var(--card-border);border-radius:99px;height:6px;margin-top:6px;overflow:hidden}
.uv-bar-fill{height:100%;border-radius:99px;transition:width .5s}
.uv-label{font-size:11px;color:var(--text-soft);opacity:.6;margin-top:2px}
.forecast-title{font-size:16px;font-weight:500;margin-bottom:16px;color:var(--text-soft)}
.forecast-day{display:flex;align-items:center;padding:10px 0}
.forecast-day+.forecast-day{border-top:1px solid var(--card-border)}
.day-name{width:100px;font-size:14px;font-weight:500}
.day-icon{font-size:22px;width:32px;text-align:center;margin:0 12px}
.day-desc{flex:1;font-size:13px;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.temp-bar-wrap{width:80px;height:4px;background:var(--card-border);border-radius:99px;overflow:hidden;margin:0 8px;flex-shrink:0}
.temp-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gradient-2),var(--gradient-1))}
.day-high{font-size:14px;font-weight:500;min-width:32px;text-align:right}
.day-low{font-size:14px;color:var(--text-soft);min-width:32px;text-align:left}
.hourly-scroll{display:flex;gap:16px;overflow-x:auto;padding:12px 0 4px;margin-top:12px;border-top:1px solid var(--card-border);-webkit-overflow-scrolling:touch}
.hourly-scroll::-webkit-scrollbar{height:3px}
.hourly-scroll::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:99px}
.hourly-item{text-align:center;min-width:56px;flex-shrink:0}
.hourly-item .h-time{font-size:12px;color:var(--text-soft);margin-bottom:4px}
.hourly-item .h-icon{font-size:20px;margin-bottom:2px}
.hourly-item .h-temp{font-size:14px;font-weight:500;font-family:var(--mono)}
.loading{text-align:center;padding:80px 20px}
.loading .spinner{width:48px;height:48px;border:4px solid var(--card-border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:16px;color:var(--text-soft)}
.error-card{background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:var(--radius);padding:40px;text-align:center;box-shadow:var(--shadow)}
.error-card p{color:var(--text-soft);margin-bottom:12px}
.error-card .err-detail{font-size:12px;opacity:.6;margin-bottom:16px;line-height:1.6}
.error-card button{background:var(--primary);border:none;color:#fff;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;transition:background .2s}
.error-card button:hover{background:var(--primary-dark)}
.app-footer{background:var(--footer-bg);padding:20px 24px;text-align:center;position:relative;z-index:1;border-top:1px solid var(--nav-border);margin-top:48px}
.app-footer p{margin:0;color:var(--text-soft);font-size:12px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:576px){
.header-content{padding:0 16px}
.app-content{padding:24px 16px 40px}
.weather-card,.forecast-card{padding:20px}
.temp-current{font-size:48px}
.nav-links a{font-size:12px;padding:5px 8px}
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<header class="app-header">
  <div class="header-content">
    <span class="brand" onclick="location.href='https://www.page.roooooyan.work'" style="cursor:pointer">Yanverse</span>
  </div>
</header>

<main class="app-content">
  <div class="page-title"><span>天气</span></div>
  <div id="app">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在获取位置和天气信息...</p>
    </div>
  </div>
</main>

<footer class="app-footer">
  <p>&copy; 2013 - <span id="year">2026</span> Yanverse · 天气 · 数据来源：Open-Meteo</p>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

function weatherCodeToInfo(code){
if(code===0)return{emoji:'☀️',desc:'晴'}
if(code===1)return{emoji:'🌤️',desc:'少云'}
if(code===2)return{emoji:'⛅',desc:'多云'}
if(code===3)return{emoji:'☁️',desc:'阴'}
if(code===45||code===48)return{emoji:'🌫️',desc:'雾'}
if(code>=51&&code<=55)return{emoji:'🌦️',desc:'毛毛雨'}
if(code>=61&&code<=63)return{emoji:'🌧️',desc:'雨'}
if(code===65)return{emoji:'🌧️',desc:'大雨'}
if(code>=66&&code<=67)return{emoji:'🌧️',desc:'冻雨'}
if(code>=71&&code<=73)return{emoji:'🌨️',desc:'雪'}
if(code===75)return{emoji:'🌨️',desc:'大雪'}
if(code===80&&code<=82)return{emoji:'🌦️',desc:'阵雨'}
if(code>=85&&code<=86)return{emoji:'🌨️',desc:'阵雪'}
if(code>=95)return{emoji:'⛈️',desc:'雷暴'}
return{emoji:'🌤️',desc:'未知'}
}

async function init(){
const app=document.getElementById('app');
let lat=39.92,lon=116.41,city='',region='',district='',country='';

try {
const ipRes=await fetch('https://ip9.com.cn/get');
const ipData=await ipRes.json();
const d=ipData.data;
country=d.country||'';region=d.prov||'';city=d.city||'';district=d.area||'';
if(d.lat)lat=parseFloat(d.lat);
if(d.lng)lon=parseFloat(d.lng);
} catch{try {
const r=await fetch('https://myip.ipip.net/json');
const d=await r.json();const loc=d.data.location;
country=loc[0]||'';region=loc[1]||'';city=loc[2]||'';district=loc[3]||'';
}catch{}}

try {
const pos=await new Promise((res,rej)=>{navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000,enableHighAccuracy:false})});
lat=pos.coords.latitude;lon=pos.coords.longitude;
} catch {}

try {
const params=new URLSearchParams({
latitude:lat,longitude:lon,
current:'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,uv_index',
daily:'temperature_2m_max,temperature_2m_min,weather_code,uv_index_max',
hourly:'temperature_2m,weather_code',timezone:'auto',forecast_days:'7'
});
const wr=await fetch('https://api.open-meteo.com/v1/forecast?'+params);
const data=await wr.json();
render(data,city,region,district,country)
}catch(e){
app.innerHTML='<div class="error-card"><p>获取天气信息失败</p><p class="err-detail">'+e.message+'</p><button onclick="init()">重新加载</button></div>'
}
}

function render(data,city,region,district,country){
const cur=data.current;
const currInfo=weatherCodeToInfo(cur.weather_code);
const daily=data.daily;
const hourly=data.hourly;
const temp=Math.round(cur.temperature_2m);
const feels=Math.round(cur.apparent_temperature);
const uv=parseFloat(cur.uv_index)||0;
const humidity=cur.relative_humidity_2m;
const wind=Math.round(cur.wind_speed_10m);
const now=new Date();
const timeStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
const high=Math.round(daily.temperature_2m_max[0]);
const low=Math.round(daily.temperature_2m_min[0]);

let uvColor='#4ade80',uvText='低';
if(uv>=3){uvColor='#facc15';uvText='中等'}
if(uv>=6){uvColor='#fb923c';uvText='高'}
if(uv>=8){uvColor='#ef4444';uvText='很高'}
if(uv>=11){uvColor='#a855f7';uvText='极高'}
const uvPct=Math.min(uv/11*100,100);

function getDayName(dateStr,idx){
if(idx===0)return'今天';
if(idx===1)return'明天';
if(idx===2)return'后天';
const d=new Date(dateStr+'T12:00:00');
return['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]
}

const allMins=daily.temperature_2m_min.map(t=>Math.round(t));
const allMaxs=daily.temperature_2m_max.map(t=>Math.round(t));
const globalMin=Math.min(...allMins);
const globalMax=Math.max(...allMaxs);
const globalRange=globalMax-globalMin||1;

let forecastHTML='';
for(let i=0;i<7;i++){
const dInfo=weatherCodeToInfo(daily.weather_code[i]);
const dHigh=Math.round(daily.temperature_2m_max[i]);
const dLow=Math.round(daily.temperature_2m_min[i]);
const avgTemp=(dHigh+dLow)/2;
const barPct=Math.min(Math.max((avgTemp-globalMin)/globalRange*100,5),100);
forecastHTML+='<div class="forecast-day"><span class="day-name">'+getDayName(daily.time[i],i)+'</span><span class="day-icon">'+dInfo.emoji+'</span><span class="day-desc">'+dInfo.desc+'</span><span class="day-low">'+dLow+'°</span><div class="temp-bar-wrap"><div class="temp-bar-fill" style="width:'+barPct+'%"></div></div><span class="day-high">'+dHigh+'°</span></div>'
}

let hourlyHTML='';
if(hourly&&hourly.time){
const nowHour=now.getHours();
let startIdx=hourly.time.findIndex(t=>parseInt(t.slice(11,13))>=nowHour);
if(startIdx===-1)startIdx=0;
for(let i=0;i<8&&startIdx+i<hourly.time.length;i++){
const idx=startIdx+i;
const hInfo=weatherCodeToInfo(hourly.weather_code[idx]);
const hTemp=Math.round(hourly.temperature_2m[idx]);
hourlyHTML+='<div class="hourly-item"><div class="h-time">'+hourly.time[idx].slice(11,16)+'</div><div class="h-icon">'+hInfo.emoji+'</div><div class="h-temp">'+hTemp+'°</div></div>'
}
}

const locParts=[];
if(district)locParts.push(district);
if(city)locParts.push(city);
if(region)locParts.push(region);
if(country)locParts.push(country);

app.innerHTML='<div class="weather-card"><div class="location"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg><span>当前位置</span></div><div class="city-name">'+(locParts.join('，')||'未知位置')+'</div><div class="update-time">更新于 '+timeStr+'</div><div class="weather-main"><div class="weather-icon">'+currInfo.emoji+'</div><div class="temp-group"><div class="temp-current">'+temp+'°C</div><div class="temp-range">体感 '+feels+'°C · 最高 '+high+'°C / 最低 '+low+'°C</div><div class="weather-desc">'+currInfo.desc+'</div></div></div>'+(hourlyHTML?'<div class="hourly-scroll">'+hourlyHTML+'</div>':'')+'<div class="details-grid"><div class="detail-item"><div class="label">紫外线</div><div class="value" style="color:'+uvColor+'">'+uv.toFixed(1)+' <span class="unit">'+uvText+'</span></div><div class="uv-bar-wrap"><div class="uv-bar-fill" style="width:'+uvPct+'%;background:'+uvColor+'"></div></div><div class="uv-label">0-2低 3-5中 6-7高 8-10很高 11+极高</div></div><div class="detail-item"><div class="label">湿度</div><div class="value">'+humidity+'<span class="unit">%</span></div></div><div class="detail-item"><div class="label">风速</div><div class="value">'+wind+'<span class="unit"> km/h</span></div></div><div class="detail-item"><div class="label">体感温度</div><div class="value">'+feels+'<span class="unit">°C</span></div></div></div></div><div class="forecast-card"><div class="forecast-title">近7日天气预报</div>'+forecastHTML+'</div>'
}

init();
</script>
</body>
</html>
