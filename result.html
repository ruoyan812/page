<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>搜索结果 - Yanverse</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #06b6d4;
    --primary-dark: #0891b2;
    --gradient-1: #06b6d4;
    --gradient-2: #3b82f6;
    --gradient-3: #8b5cf6;
    --bg: #f0f4f8;
    --card-bg: rgba(255,255,255,0.75);
    --card-border: rgba(255,255,255,0.3);
    --text: #0f172a;
    --text-soft: #64748b;
    --nav-bg: rgba(15,23,42,0.9);
    --nav-border: rgba(255,255,255,0.08);
    --footer-bg: rgba(15,23,42,0.95);
    --shadow: 0 8px 32px rgba(0,0,0,0.06);
    --radius: 16px;
    --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b1120;
      --card-bg: rgba(30,41,59,0.7);
      --card-border: rgba(148,163,184,0.15);
      --text: #f1f5f9;
      --text-soft: #94a3b8;
      --nav-bg: rgba(15,23,42,0.95);
      --footer-bg: rgba(2,6,23,0.98);
      --shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
  }

  html, body { height: 100%; }
  html { font-family: var(--font); color: var(--text); }
  body {
    margin: 0;
    background: var(--bg);
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    transition: background 0.4s, color 0.4s;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 20s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
    top: -120px; left: -80px;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: linear-gradient(135deg, var(--gradient-2), var(--gradient-3));
    bottom: -100px; right: -60px;
    animation-delay: -7s;
  }
  @keyframes orbFloat {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(30px, -40px) scale(1.08); }
    66%  { transform: translate(-20px, 20px) scale(0.95); }
    100% { transform: translate(10px, -10px) scale(1.05); }
  }

  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--nav-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--nav-border);
    flex-shrink: 0;
  }
  .header-content {
    max-width: 900px;
    margin: 0 auto;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
  }
  .brand {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gradient-1), var(--gradient-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1.5px;
    cursor: pointer;
  }
  .back-link {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 8px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-link:hover {
    color: #fff;
    background: rgba(255,255,255,0.06);
  }

  .app-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
    min-height: 0;
  }

  .result-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--card-border);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .result-bar .query-label {
    font-size: 14px;
    color: var(--text-soft);
    white-space: nowrap;
  }
  .result-bar .query-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .result-bar .re-search {
    margin-left: auto;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 500;
    border: none;
    background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
    color: #fff;
    border-radius: 16px;
    cursor: pointer;
    transition: opacity 0.2s;
    font-family: var(--font);
    white-space: nowrap;
    text-decoration: none;
  }
  .result-bar .re-search:hover { opacity: 0.85; }

  .result-frame-wrap {
    flex: 1;
    padding: 0;
    position: relative;
  }
  .result-frame-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    position: absolute;
    top: 0; left: 0;
  }

  .app-footer {
    background: var(--footer-bg);
    padding: 20px 24px;
    text-align: center;
    flex-shrink: 0;
    border-top: 1px solid var(--nav-border);
  }
  .app-footer p {
    margin: 0;
    color: var(--text-soft);
    font-size: 12px;
  }

  @keyframes orbFloat {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(30px, -40px) scale(1.08); }
    66%  { transform: translate(-20px, 20px) scale(0.95); }
    100% { transform: translate(10px, -10px) scale(1.05); }
  }

  @media (max-width: 576px) {
    .header-content { padding: 0 16px; }
    .result-bar { padding: 10px 16px; flex-wrap: wrap; }
    .result-bar .re-search { margin-left: 0; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header class="app-header">
  <div class="header-content">
    <span class="brand" onclick="location.href='/'">Yanverse</span>
    <a class="back-link" href="/">← 返回首页</a>
  </div>
</header>

<main class="app-content">
  <div class="result-bar">
    <span class="query-label">搜索</span>
    <span class="query-value" id="queryDisplay"></span>
    <a class="re-search" href="search.html">重新搜索</a>
  </div>
  <div class="result-frame-wrap">
    <iframe id="resultFrame" title="搜索结果"></iframe>
  </div>
</main>

<footer class="app-footer">
  <p>&copy; 2013 - <span id="year">2026</span> Yanverse</p>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

var params = new URLSearchParams(window.location.search);
var q = params.get('q');
if (q) {
  document.getElementById('queryDisplay').textContent = q;
  document.getElementById('resultFrame').src = 'https://www.bing.com/search?q=' + encodeURIComponent(q);
} else {
  document.getElementById('queryDisplay').textContent = '未输入搜索内容';
}
</script>
</body>
</html>
