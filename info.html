<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>访问信息 - Yanverse</title>
 <style>
     body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #222;
}

.header {
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid #eee;
}

.container {
    max-width: 600px;
    margin: 30px auto;
    padding: 0 20px;
}

.time {
    font-size: 32px;
    font-weight: bold;
}

.date {
    font-size: 14px;
    color: #666;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    box-sizing: border-box;
}

button {
    padding: 8px 16px;
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: #999;
}
 </style>
</head>
<body>
    <header class="header">
        <h1>你的访问信息</h1>
    </header>

    <main class="container">
        <div class="info-box">
            <p id="ip">IP：正在获取...</p>
            <p id="version">IP版本：正在获取...</p>
            <p id="country">国家：正在获取...</p>
            <div id="ua-info"></div>
        </div>
    </main>

    <footer>
        <code>© 2013 - 2026 Yanverse</code>
    </footer>

    <script>
        fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                document.getElementById('ip').innerText = 'IP：' + data.ip;
                document.getElementById('version').innerText = 'IP版本：' + data.version;
                document.getElementById('country').innerText = '国家：' + data.country_name;
            })
            .catch(() => {
                document.getElementById('ip').innerText = 'IP：获取失败';
                document.getElementById('version').innerText = 'IP版本：获取失败';
                document.getElementById('country').innerText = '国家：获取失败';
            });

        if (navigator.userAgentData) {
            navigator.userAgentData.getHighEntropyValues(["uaFullVersion"])
                .then(ua => {
                    document.getElementById('ua-info').innerHTML = `
                        <p>浏览器品牌：${navigator.userAgentData.brands.map(b => b.brand).join(', ')}</p>
                        <p>浏览器版本：${ua.uaFullVersion}</p>
                    `;
                });
        }
    </script>
</body>
</html>
